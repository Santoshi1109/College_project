<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
  background: linear-gradient(to right, #0b6623, #1f8a50);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.login-box{
  background:white;
  padding:25px;
  width:320px;
  border-radius:12px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:95%;
  padding:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input id="email" type="email" value="admin@gmail.com">
  <input id="password" type="password" placeholder="Password">

  <button onclick="adminLogin()">LOG IN</button>
</div>

<script>
async function adminLogin(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("token", data.token);
    window.location.href = "admin_dashboard.html"; // ✅ FIXED
  } else {
    alert("Invalid email or password");
  }
}
</script>

</body>
</html>
