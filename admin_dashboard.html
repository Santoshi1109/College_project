<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard | ZooSphere</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f2f2f2;
}

/* SIDEBAR */
.sidebar{
  width:320px;
  height:100vh;
  background:#0b6623;
  position:fixed;
  top:0;
  left:0;
  color:white;
  padding-top:20px;
  box-shadow:2px 0 12px rgba(0,0,0,0.25);
  overflow-y:auto;
}

.sidebar-logo img{
  width:150px;
  display:block;
  margin:10px auto;
}

/* Main Links */
.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:16px 25px;
  font-size:18px;
  font-weight:600;
  transition:0.3s;
}

.sidebar a:hover{
  background:#084d1a;
  border-radius:6px;
}

/* Dropdown */
.dropdown{
  position:relative;
}

.submenu{
  display:none;
  background:#084d1a;
}

.submenu a{
  padding:12px 45px;
  font-size:16px;
  font-weight:500;
}

.dropdown:hover .submenu{
  display:block;
}

/* MAIN */
.main{
  margin-left:320px;
  padding:30px;
}

.topbar{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* DASHBOARD GRID */
.dashboard-grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:20px;
  margin-top:25px;
}

/* CARDS */
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.logout-btn{
  background:red;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <img src="https://as2.ftcdn.net/v2/jpg/00/75/17/15/1000_F_75171518_FPVzsehsk5OiUZs4YekTXtMje3ktFZBL.jpg" alt="Zoo Logo">
  </div>

  <a href="admin_dashboard.html">Dashboard</a>
  <!-- USERS -->
    <a href="admin_users.html">Users</a>
  <!-- TICKETS -->
    <a href="admin_tickets.html">Tickets</a>
  <!-- ANIMALS -->
  <div class="dropdown">
    <a href="#">Animals</a>
    <div class="submenu">
      <a href="add_animal.html">Add Animals</a>
      <a href="view_animal.html">View Animals</a>
    </div>
  </div>
  <!-- EVENTS -->
    <a href="admin_add_events.html">Events</a>
  <!-- FEEDBACK -->
    <a href="admin_feedback.html">Feedback</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <div class="topbar">
    <h2>Welcome, Admin</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="dashboard-grid">

    <div class="card">
      <h3>Total Tickets</h3>
      <h2 id="totalTickets">0</h2>
    </div>

    <div class="card">
      <h3>Organized Events</h3>
      <h2 id="totalEvents">0</h2>
    </div>

    <div class="card">
      <h3>Total Animals</h3>
      <h2 id="totalAnimals">0</h2>
    </div>

    <div class="card">
      <h3>Total System Users</h3>
      <h2 id="totalUsers">0</h2>
    </div>

    <div class="card">
      <h3>Unreviewed Feedback</h3>
      <h2 id="unreviewed">0</h2>
    </div>
 
    <div class="card">
      <h3>Reviewed Feedback</h3>
      <h2 id="reviewed">0</h2>
    </div>

    <div class="card">
      <h3>Total Ticket Revenue</h3>
      <h2 id="revenue">0</h2>
    </div>

    <div class="card">
      <h3>System Status</h3>
      <h2 id="systemStatus">Active</h2>
    </div>

  </div>
</div>

<script>
// CHECK LOGIN
const token = localStorage.getItem("token");
if (!token) {
  alert("Please login first!");
  window.location.href = "admin_login.html";
}

// LOGOUT FUNCTION
function logout(){
  localStorage.removeItem("token");
  window.location.href = "admin_login.html";
}

// LOAD DASHBOARD DATA
async function loadDashboard() {
  try {
    const response = await fetch("http://localhost:5000/api/dashboard");
    const data = await response.json();

    document.getElementById("totalTickets").innerText = data.totalTickets || 0;
    document.getElementById("totalEvents").innerText = data.totalEvents || 0;
    document.getElementById("totalAnimals").innerText = data.totalAnimals || 0;
    document.getElementById("totalUsers").innerText = data.totalUsers || 0;
    document.getElementById("unreviewed").innerText = data.unreviewedFeedback || 0;
    document.getElementById("reviewed").innerText = data.reviewedFeedback || 0;
    document.getElementById("revenue").innerText = data.totalRevenue || 0;

  } catch (error) {
    console.error("Error loading dashboard:", error);
  }
}

loadDashboard();
</script>

</body>
</html>
